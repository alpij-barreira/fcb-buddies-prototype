<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#080b1a">
  <title>Barça Buddies — Vive el partido en compañía</title>
  <link rel="stylesheet" href="css/tokens.css?v=18">
  <link rel="stylesheet" href="css/styles.css?v=18">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
</head>
<body>
  <!-- Marco de smartphone simulado (solo visible en pantallas anchas) -->
  <div class="phone">
  <div id="app">

    <!-- Barra de estado + isla dinámica simuladas (solo con el marco) -->
    <div class="phone-statusbar" aria-hidden="true">
      <span class="phone-statusbar__time">9:41</span>
      <span class="phone-statusbar__icons">
        <svg viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="0.8"/><rect x="5" y="5.5" width="3" height="6.5" rx="0.8"/><rect x="10" y="3" width="3" height="9" rx="0.8"/><rect x="15" y="0.5" width="3" height="11.5" rx="0.8"/></svg>
        <svg viewBox="0 0 16 12" fill="currentColor"><path d="M8 9.6a1.7 1.7 0 1 1 0 3.4 1.7 1.7 0 0 1 0-3.4zM8 5.2c1.8 0 3.4.7 4.6 1.9l-1.5 1.5A4.5 4.5 0 0 0 8 7.4c-1.2 0-2.3.5-3.1 1.2L3.4 7.1A6.5 6.5 0 0 1 8 5.2zM8 .8c3 0 5.7 1.2 7.7 3.1l-1.5 1.5A8.7 8.7 0 0 0 8 3 8.7 8.7 0 0 0 1.8 5.4L.3 3.9A10.9 10.9 0 0 1 8 .8z"/></svg>
        <svg viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.5"/><rect x="2" y="2" width="15" height="8" rx="1.6" fill="currentColor"/><path d="M23.5 4v4a2.2 2.2 0 0 0 0-4z" fill="currentColor" opacity="0.5"/></svg>
      </span>
    </div>
    <div class="phone-island" aria-hidden="true"></div>

    <!-- ===================== HOME · Feed de partidos ===================== -->
    <section id="screen-home" class="screen screen-home is-active" aria-label="Partidos">
      <button type="button" class="home-location" id="home-location" aria-label="Cambiar ubicación de búsqueda">
        <span class="home-location__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7Z"/><circle cx="12" cy="9" r="2.5"/></svg>
        </span>
        <span class="home-location__text">
          <span class="home-location__eyebrow">Viendo sitios cerca de</span>
          <strong id="home-location-label">…</strong>
        </span>
        <span class="home-location__change">Cambiar</span>
      </button>
      <div class="home-filterbar">
        <button type="button" class="home-filter" id="home-filter-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 5h18L14 14v5l-4 2v-7L3 5z"/></svg>
          <span class="home-filter__label" id="home-filter-label">Masculino · Todas</span>
          <svg class="home-filter__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <button type="button" class="home-icon-btn" id="home-calendar-btn" aria-label="Ver calendario de partidos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </button>
      </div>
      <div id="home-content" class="home-content"></div>
    </section>

    <!-- ===================== Detalle de partido ===================== -->
    <section id="screen-match-detail" class="screen screen-detail" aria-label="Detalle del partido">
      <header class="detail-header">
        <button type="button" class="detail-header__back" data-nav-back aria-label="Volver">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span class="detail-header__title">Partido</span>
      </header>
      <div id="match-detail-content" class="detail-content"></div>
    </section>

    <!-- ===================== Detalle de sitio ===================== -->
    <section id="screen-venue-detail" class="screen screen-detail" aria-label="Detalle del sitio">
      <header class="detail-header">
        <button type="button" class="detail-header__back" data-nav-back aria-label="Volver">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span class="detail-header__title">Dónde verlo</span>
      </header>
      <div id="venue-detail-content" class="detail-content"></div>
    </section>

    <!-- ===================== Mis entradas ===================== -->
    <section id="screen-tickets" class="screen screen-tickets" aria-label="Mis entradas">
      <header class="app-header">
        <div class="app-header__brand">
          <span class="app-header__title">Mis entradas</span>
        </div>
        <button type="button" class="header-profile" id="header-profile" data-open-profile aria-label="Tu perfil">
          <span class="header-profile__avatar" id="header-profile-initial" aria-hidden="true">·</span>
          <span class="header-profile__name" id="header-profile-name"></span>
        </button>
      </header>
      <div id="tickets-content" class="tickets-content"></div>
    </section>

    <!-- ===================== Sheet de reserva ===================== -->
    <div class="sheet-overlay" id="reserve-overlay" aria-hidden="true"></div>
    <div class="filter-sheet reserve-sheet" id="reserve-sheet" role="dialog" aria-modal="true" aria-labelledby="reserve-title">
      <div id="reserve-content"></div>
    </div>

    <!-- ===================== Overlay del ticket (entrada de estadio) ===================== -->
    <div class="ticket-overlay" id="ticket-overlay" aria-hidden="true">
      <div class="ticket-stage" id="ticket-stage"></div>
    </div>

    <!-- ===================== Modal de ubicación ===================== -->
    <div class="sheet-overlay" id="location-overlay" aria-hidden="true"></div>
    <div class="filter-sheet location-sheet" id="location-sheet" role="dialog" aria-modal="true" aria-labelledby="location-title">
      <div id="location-content"></div>
    </div>

    <!-- ===================== Sheet: ordenar y filtrar sitios ===================== -->
    <div class="sheet-overlay" id="venue-opts-overlay" aria-hidden="true"></div>
    <div class="filter-sheet" id="venue-opts-sheet" role="dialog" aria-modal="true" aria-labelledby="venue-opts-title">
      <div id="venue-opts-content"></div>
    </div>

    <!-- ===================== Sheet: filtrar partidos (equipo + competición) ===================== -->
    <div class="sheet-overlay" id="home-filter-overlay" aria-hidden="true"></div>
    <div class="filter-sheet" id="home-filter-sheet" role="dialog" aria-modal="true" aria-labelledby="home-filter-title">
      <div id="home-filter-content"></div>
    </div>

    <!-- ===================== Sheet: calendario de partidos ===================== -->
    <div class="sheet-overlay" id="calendar-overlay" aria-hidden="true"></div>
    <div class="filter-sheet calendar-sheet" id="calendar-sheet" role="dialog" aria-modal="true" aria-labelledby="calendar-title">
      <div id="calendar-content"></div>
    </div>

    <!-- ===================== Sheet de perfil (demo) ===================== -->
    <div class="sheet-overlay" id="profile-overlay" aria-hidden="true"></div>
    <div class="filter-sheet" id="profile-sheet" role="dialog" aria-modal="true" aria-labelledby="profile-title">
      <div id="profile-content"></div>
    </div>

    <!-- ===================== Mini-nav flotante autoocultable ===================== -->
    <nav class="mini-nav" id="mini-nav" aria-label="Navegación principal">
      <button type="button" class="mini-nav__btn is-active" data-main-tab="home" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7.5l4.28 3.11-1.63 5.03H9.35l-1.63-5.03z"/><path d="M12 7.5V3M16.28 10.61l4.28-1.39M14.65 15.64l2.64 3.64M9.35 15.64l-2.64 3.64M7.72 10.61 3.44 9.22"/></svg>
        <span>Partidos</span>
      </button>
      <button type="button" class="mini-nav__btn" data-main-tab="tickets">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4z"/><path d="M15 6v12"/></svg>
        <span>Mis entradas</span>
      </button>
    </nav>

  </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/matches-data.js?v=18"></script>
  <script src="js/data.js?v=18"></script>
  <script src="js/map.js?v=18"></script>
  <script src="js/matches.js?v=18"></script>
  <script src="js/app.js?v=18"></script>
</body>
</html>
